<div class="static-page container">
    <div class="page-header">
        <h1>Contact Us</h1>
        <p>Have a question or need assistance? We're here to help.</p>
    </div>
    
    <div class="contact-layout">
        <div class="contact-info">
            <div class="info-block">
                <h3>Our Office</h3>
                <p>123 Discovery Way, Tech Hub<br>San Francisco, CA 94107<br>United States</p>
            </div>
            <div class="info-block">
                <h3>Contact Details</h3>
                <p>Email: support&#64;discovery.com<br>Phone: +1 (555) 123-4567</p>
            </div>
            <div class="info-block">
                <h3>Business Hours</h3>
                <p>Monday - Friday: 9am - 6pm EST<br>Weekend: Closed</p>
            </div>
        </div>
        
        <div class="contact-form">
            <form>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" class="form-control">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com" class="form-control">
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <select class="form-control">
                        <option>General Inquiry</option>
                        <option>Billing Support</option>
                        <option>Technical Issue</option>
                        <option>Report a User</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="How can we help you?" class="form-control" rows="5"></textarea>
                </div>
                <button type="button" class="btn btn-primary w-100 mt-3">Send Message</button>
            </form>
        </div>
    </div>
</div>
